# ============================================================================
# 应用主配置文件
# ============================================================================
# 本文件定义应用的基本信息和服务器配置
# 可通过环境变量覆盖部分配置（优先级：环境变量 > YAML 配置）
# ============================================================================

# ---------------------------------------------------------------------------
# 应用基本信息
# ---------------------------------------------------------------------------
app:
  # 应用名称，显示在欢迎信息和日志中
  name: AI写作助手系统
  
  # 应用版本号，遵循语义化版本规范 (major.minor.patch)
  version: 0.1.0
  
  # 调试模式开关
  # true: 启用详细日志、错误堆栈追踪（开发环境推荐）
  # false: 关闭调试信息，优化性能（生产环境必须设置为 false）
  debug: false

# ---------------------------------------------------------------------------
# Web 服务器配置
# ---------------------------------------------------------------------------
# 用于 FastAPI/Uvicorn 服务的启动参数
server:
  # 服务器监听地址
  # "0.0.0.0": 接受所有网络接口的连接（局域网可访问）
  # "127.0.0.1": 仅本地访问（更安全）
  host: 127.0.0.1
  
  # 服务器监听端口号
  # 默认 8000，如被占用可修改为其他端口（如 8080、3000 等）
  port: 8000

# ---------------------------------------------------------------------------
# 检索器配置
# ---------------------------------------------------------------------------
# 控制 Retriever 模块的默认行为（用于 RAG 流程中的高级检索策略）
retriever:
  # 默认返回结果数量（默认 5）
  top_k: 5

  # 相似度得分阈值（仅返回得分 >= 此值的结果，余弦相似度越高越相似）
  # DashScope text-embedding-v3 模型分数范围通常 0.2~0.5，设为 0.2 或更低
  # 设为 null 或 0 则不过滤（默认 0.2）
  score_threshold: 0.2

  # 是否启用结果去重（基于文本内容相似度，默认 true）
  deduplicate: true

  # 去重相似度阈值（两条结果文本重合度超过此值则合并，默认 0.9）
  dedup_similarity: 0.9

  # LLMRerank 重排序配置
  rerank:
    # 是否启用 LLMRerank 后处理（默认 false，启用后会用 LLM 对检索结果重新排序）
    enabled: false
    # 重排序后保留的 Top N 结果数（默认 3，应小于等于 top_k）
    top_n: 3

# ---------------------------------------------------------------------------
# 文本分割配置
# ---------------------------------------------------------------------------
# 控制文本分割器的默认行为（用于 RAG 流程中将文档切分为向量化块）
text_splitter:
  # 每个文本块的目标字符数（默认 500）
  chunk_size: 500

  # 相邻文本块之间的重叠字符数（默认 50）
  # 重叠可保留上下文连贯性，防止语义在边界处被截断
  chunk_overlap: 50

  # 文本块的最大字符数上限（超过则强制截断，默认 1000）
  max_chunk_size: 1000

# ---------------------------------------------------------------------------
# 生成器配置
# ---------------------------------------------------------------------------
# 控制 Generator 模块的默认行为（用于 RAG 流程中整合检索结果与大模型生成）
generator:
  # 检索上下文最大字符数（默认 3000）
  # 超出则截断，防止 Prompt 过长导致 token 超限
  max_context_chars: 3000

  # 默认系统提示词（当 prompts.yaml 中无对应角色时使用）
  default_system_prompt: "你是一个专业的写作助手，请根据提供的参考资料回答用户问题。如果参考资料中没有相关信息，请如实告知。"

  # 是否在生成的回答中附带引用来源标注（默认 true）
  include_sources: true

  # 生成温度参数（None 时使用 LLMClient 的默认值）
  # 较低值（如 0.3）适合事实性问答，较高值（如 0.8）适合创意写作
  temperature: null

  # 单次生成最大 token 数（None 时使用 LLMClient 的默认值）
  max_tokens: null

# ---------------------------------------------------------------------------
# Agents 智能体配置
# ---------------------------------------------------------------------------
# 控制 Agent 模块和流水线协调器的默认行为
agents:
  # 默认流水线阶段顺序（orchestrator 使用）
  # 可选项: research / write / edit
  pipeline:
    - research
    - write
    - edit

  # 各 Agent 最大反思迭代次数（None 时使用 Agent 内部默认值 2）
  max_reflections: null

  # 研究 Agent 默认检索结果数量（None 时使用 retriever 的 top_k）
  research_top_k: null

  # 写作 Agent 默认写作风格（None 时不指定）
  write_style: null

  # 编辑 Agent 默认编辑模式（full / grammar / expression / structure）
  edit_mode: full

  # 编辑 Agent 反思质量阈值（0.0~1.0，高于 WriterAgent 的 0.7）
  edit_quality_threshold: 0.75

  # 研究验证配置（条件分支工作流）
  # 启用后在 research 和 write 之间插入 validate 节点，
  # 使用 LLM 评估研究结果是否充分，不充分则回到 research 重新检索
  validation:
    # 是否启用研究结果验证（默认 false，启用后激活条件边工作流）
    enabled: false
    # 最大重试次数（验证不通过时回到 research 的次数上限，防止死循环）
    max_retries: 2
    # 验证通过的质量阈值（0.0~1.0，LLM 评分归一化后高于此值视为通过）
    quality_threshold: 0.6
